name: Publish Beta

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'GitHub tag to publish as beta (e.g. v1.5.0-beta.1)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Test
        run: npm run test

      - name: Publish to NPM with beta tag
        run: npm publish --tag beta